[platformio]
default_envs = esp32dev

; ── Shared settings inherited by all environments ────────────────────────────
[env]
platform    = espressif32
board       = esp32dev
framework   = arduino

monitor_speed  = 115200
upload_speed   = 921600

lib_deps =
    https://github.com/beegee-tokyo/DHTesp.git
    mathieucarbou/ESPAsyncWebServer @ ^3.3.23
    mathieucarbou/AsyncTCP @ ^3.3.2
    bblanchon/ArduinoJson @ ^7.1.0
    crankyoldgit/IRremoteESP8266 @ ^2.8.6

board_build.filesystem  = littlefs
board_build.partitions  = partitions_custom.csv

extra_scripts = pre:scripts/build_html.py

build_flags =
    -DCORE_DEBUG_LEVEL=0          ; production: strip ESP-IDF log strings from flash
    -DCONFIG_ARDUHAL_LOG_COLORS=0 ; no ANSI color codes in log output
    -Os                           ; optimize for size
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=16384  ; double Core 1 stack (default 8192 is too tight)
    -DCONFIG_ASYNC_TCP_TASK_STACK_SIZE=16384  ; async_tcp default 8192 overflows on LittleFS+JSON paths

; ── USB serial upload (first flash / cable attached) ─────────────────────────
[env:esp32dev]

; ── OTA upload (device running on WiFi at 192.168.1.200) ─────────────────────
[env:ota]
upload_protocol = espota
upload_port     = 192.168.1.200
upload_flags    =
    --auth=REDACTED
    --timeout=120
